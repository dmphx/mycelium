services:
  mycelium:
    build: .
    image: ghcr.io/corveck79/mycelium:latest
    container_name: mycelium
    restart: unless-stopped
    ports:
      - "8088:8088"
      - "8089:8089"
    env_file:
      - .env
    environment:
      - LISTEN_HOST=0.0.0.0
      - LISTEN_PORT=8088
      # WARNING: opens the dashboard to anyone who reaches port 8088.
      # Acceptable for local development on a trusted LAN. For any deploy
      # reachable beyond localhost, remove this line and configure one of
      # AUTH_ENABLED, OIDC_ENABLED, or TRUSTED_PROXY_AUTH instead.
      - INSECURE_ALLOW_ANON=true
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "937"
    volumes:
      - ./data:/data
      - ./static/jellyfin-splash.png:/app/static/jellyfin-splash.png:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8088/health',timeout=5); sys.exit(0 if r.status==200 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
